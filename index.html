<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BACKROOMS: INFINITE DESCENT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-yellow: #e2ce73;       
            --shadow-yellow: #bfae59;   
            --text-dark: #1f1d16;       
            --terminal-red: #9e0000;    
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-yellow);
            color: var(--text-dark);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Effetto VHS statico sullo sfondo */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.07) 50%);
            z-index: 10;
            background-size: 100% 4px;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.3) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* IL CONTENITORE DI GIOCO REMANE SEMPRE FERMO E LEGGIBILE */
        #game-container {
            max-width: 700px;
            width: 100%;
            border: 3px double var(--text-dark);
            padding: 30px;
            background-color: rgba(226, 206, 115, 0.95); 
            backdrop-filter: blur(1px);
            z-index: 20; /* Sopra gli effetti di glitch dello sfondo */
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Titoli in testa */
        #game-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            border-bottom: 3px double var(--text-dark);
            padding-bottom: 10px;
        }

        #game-subtitle {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #57523d;
        }

        /* Status Bar */
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--text-dark);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .stat-label { color: #5c553a; }
        .stat-val { color: var(--text-dark); }

        #inventory-container { display: flex; gap: 5px; align-items: center; }

        .use-item-btn {
            background: var(--text-dark);
            color: var(--bg-yellow);
            border: none;
            padding: 2px 6px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
        }

        .use-item-btn:hover { background: var(--terminal-red); color: #fff; }

        /* Schermo di testo */
        #text-display {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            min-height: 180px;
            white-space: pre-line;
            font-weight: 600;
        }

        #choices-container { display: flex; flex-direction: column; gap: 14px; }

        .choice-btn {
            background-color: transparent;
            color: var(--text-dark);
            border: 2px solid var(--text-dark);
            padding: 14px 20px;
            font-family: inherit;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            font-weight: bold;
        }

        .choice-btn:hover {
            background-color: var(--text-dark);
            color: var(--bg-yellow);
            padding-left: 30px;
        }

        .choice-btn:hover::before { content: "> "; position: absolute; left: 12px; }

        /* GLITCH SOTTOCONTROLLO: scuote solo lo sfondo, dura 1 secondo e non si ripete all'infinito */
        .glitch-bg {
            animation: shakeX 1s ease-in-out 1;
        }
    </style>
</head>
<body id="body-screen">

    <div id="game-container" class="animate__animated animate__fadeIn">
        <!-- Titoli in testa -->
        <div id="game-title">The Backrooms</div>
        <div id="game-subtitle">Discesa Procedurale Infinita</div>

        <!-- Barra di Stato -->
        <div id="status-bar">
            <div><span class="stat-label">STANZA:</span> <span id="stat-location" class="stat-val">#0</span></div>
            <div><span class="stat-label">SANITA':</span> <span id="stat-sanity" class="stat-val">100%</span></div>
            <div id="inventory-container"><span class="stat-label">ZAINO:</span> <span id="stat-inventory" class="stat-val">Vuoto</span></div>
        </div>

        <!-- Schermo Narrativo -->
        <div id="text-display"></div>

        <!-- Opzioni Utente -->
        <div id="choices-container"></div>
    </div>

    <script>
        // STATO DEL GIOCO
        let gameState = {
            roomCount: 0,
            sanity: 100,
            inventory: [],
            currentRoomData: {}
        };

        // DIZIONARI PER LA GENERAZIONE INFINITA
        const roomTypes = [
            "un corridoio ad angolo retto", "una stanza quadrata completamente vuota", 
            "uno snodo a tre vie", "un immenso salone pilastrato", 
            "un vicolo cieco claustrofobico", "una serie di uffici comunicanti senza porte"
        ];

        const wallDetails = [
            "la carta da parati gialla si sta scollando, rivelando vecchie macchie di umidità.",
            "les pareti sono modellate in un giallo accecante e uniforme che stordisce la vista.",
            "qualcuno ha tracciato delle frecce sbiadite sul muro con un pennarello, ma girano in tondo.",
            "la superficie della parete sembra quasi tremare se provi a guardarla con la coda dell'occhio."
        ];

        const floorDetails = [
            "la moquette è zuppa e produce un fastidioso rumore bagnato sotto le tue scarpe.",
            "l'odore acido di muffa e polvere emanato dal pavimento ti stringe la gola.",
            "il pavimento di vecchio linoleum scricchiola pesantemente a ogni passo.",
            "strisce di moquette sono state strappate via, lasciando intravedere il cemento grezzo."
        ];

        const neonDetails = [
            "le luci al neon sopra di te emettono un ronzio elettrico costante e innaturale.",
            "uno dei tubi al neon sfarfalla debolmente, proiettando ombre irregolari.",
            "la luce è fissa, fredda e ingannevole, non capisci da dove arrivi la corrente.",
            "il ronzio dei neon sembra risuonare direttamente nella tua scatola cranica."
        ];

        // GENERATORE PROCEDURALE DI STANZE
        function generateRandomRoom() {
            gameState.roomCount++;
            
            const type = roomTypes[Math.floor(Math.random() * roomTypes.length)];
            const wall = wallDetails[Math.floor(Math.random() * wallDetails.length)];
            const floor = floorDetails[Math.floor(Math.random() * floorDetails.length)];
            const neon = neonDetails[Math.floor(Math.random() * neonDetails.length)];

            let roomText = `Ti inoltri in ${type}.\n\nIntorno a te, ${wall} A terra, ${floor}\n\nIn alto, ${neon}`;
            let sanityImpact = 0;
            let hasItem = false;

            const randomEvent = Math.random();
            if (randomEvent < 0.25) {
                roomText += "\n\nSu un angolo della moquette noti una bottiglietta dimenticata di Acqua Mandorlina.";
                hasItem = true;
            } else if (randomEvent > 0.75) {
                roomText += "\n\nIl ronzio visivo e sonoro raddoppia d'intensità per un attimo. Un senso di vuoto assoluto ti colpisce lo stomaco.";
                sanityImpact = -15;
            } else if (randomEvent > 0.65 && randomEvent <= 0.75) {
                roomText += "\n\nAvverti un brivido improvviso. Oltre l'angolo cieco davanti a te, risuona il rumore di passi bagnati che si muovono rapidi.";
                sanityImpact = -20;
            }

            let choices = [
                { text: "Prosegui lungo il percorso giallo", action: "move" },
                { text: "Svolti l'angolo ed esplora la zona successiva", action: "move" }
            ];

            if (hasItem) {
                choices.unshift({ text: "Raccogli l'Acqua Mandorlina", action: "loot" });
            }

            gameState.currentRoomData = {
                text: roomText,
                sanityImpact: sanityImpact,
                choices: choices
            };
        }

        // MOTORE DI RENDERING
        function renderGame() {
            if (gameState.sanity <= 0) {
                gameState.sanity = 0;
                executeGameOver();
                return;
            }

            const room = gameState.currentRoomData;

            // Applica danno alla sanità ed esegui il glitch temporaneo dello sfondo
            if (room.sanityImpact < 0) {
                gameState.sanity += room.sanityImpact;
                room.sanityImpact = 0; 
                triggerGlitchEffect(true);
                if (gameState.sanity <= 0) { renderGame(); return; }
            } else {
                triggerGlitchEffect(false);
            }

            // Aggiorna UI
            document.getElementById("stat-location").innerText = `#${gameState.roomCount}`;
            
            const sanityElement = document.getElementById("stat-sanity");
            sanityElement.innerText = gameState.sanity + "%";
            sanityElement.style.color = gameState.sanity < 50 ? "var(--terminal-red)" : "var(--text-dark)";

            // Gestione Inventario
            const inventoryElement = document.getElementById("stat-inventory");
            if (gameState.inventory.length === 0) {
                inventoryElement.innerText = "Vuoto";
            } else {
                inventoryElement.innerHTML = "";
                gameState.inventory.forEach((item, index) => {
                    const itemSpan = document.createElement("span");
                    itemSpan.innerText = item;
                    const useBtn = document.createElement("button");
                    useBtn.innerText = "BEVI";
                    useBtn.classList.add("use-item-btn");
                    useBtn.addEventListener("click", () => useAlmondWater(index));
                    itemSpan.appendChild(useBtn);
                    inventoryElement.appendChild(itemSpan);
                });
            }

            // Stampa testo (Sempre leggibile e statico)
            document.getElementById("text-display").innerText = room.text;

            // Rigenera Pulsanti Scelta
            const choicesContainer = document.getElementById("choices-container");
            choicesContainer.innerHTML = "";

            room.choices.forEach(choice => {
                const button = document.createElement("button");
                button.classList.add("choice-btn");
                button.innerText = choice.text;
                
                button.addEventListener("click", () => {
                    if (choice.action === "move") {
                        generateRandomRoom();
                    } else if (choice.action === "loot") {
                        if (!gameState.inventory.includes("Acqua Mandorlina")) {
                            gameState.inventory.push("Acqua Mandorlina");
                        }
                        room.choices = room.choices.filter(c => c.action !== "loot");
                        room.text = room.text.replace("\n\nSu un angolo della moquette noti una bottiglietta abbandonata di Acqua Mandorlina.", "\n\nHai messo la bottiglia nello zaino.");
                    }
                    renderGame();
                });
                choicesContainer.appendChild(button);
            });
        }

        function useAlmondWater(index) {
            gameState.inventory.splice(index, 1);
            gameState.sanity = Math.min(gameState.sanity + 35, 100);
            renderGame();
        }

        // Il glitch ora scuote SOLO il body (lo sfondo) e rimuove la classe dopo 1 secondo
        function triggerGlitchEffect(activate) {
            const body = document.getElementById("body-screen");
            if (activate) {
                body.classList.add("glitch-bg");
                // Rimuove l'animazione dopo che è terminata (1 secondo), così può essere riutilizzata
                setTimeout(() => {
                    body.classList.remove("glitch-bg");
                }, 1000);
            }
        }

        function executeGameOver() {
            document.getElementById("body-screen").classList.add("glitch-bg");
            document.getElementById("stat-sanity").innerText = "0% - FOLLIA";
            document.getElementById("text-display").innerText = `La tua mente ha ceduto dopo aver esplorato ${gameState.roomCount} stanze.\n\nIl labirinto giallo ha cancellato i tuoi pensieri e la tua identità. Non stai più cercando un'uscita. Sei diventato parte delle Backrooms.`;
            
            const choicesContainer = document.getElementById("choices-container");
            choicesContainer.innerHTML = "";
            const restartBtn = document.createElement("button");
            restartBtn.classList.add("choice-btn");
            restartBtn.innerText = "Riavvia la simulazione (Ricomincia)";
            restartBtn.addEventListener("click", () => {
                gameState.roomCount = 0;
                gameState.sanity = 100;
                gameState.inventory = [];
                document.getElementById("body-screen").classList.remove("glitch-bg");
                generateRandomRoom();
                renderGame();
            });
            choicesContainer.appendChild(restartBtn);
        }

        // Avvio immediato del primo livello procedurale
        generateRandomRoom();
        renderGame();
    </script>
</body>
</html>

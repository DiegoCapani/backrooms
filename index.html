<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BACKROOMS: INFINITE DESCENT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            /* Giallo più acceso e saturo, tipico delle luci al neon commerciali */
            --bg-yellow: #e2ce73;       
            --shadow-yellow: #bfae59;   
            --text-dark: #1f1d16;       
            --terminal-red: #9e0000;    
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-yellow);
            color: var(--text-dark);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Effetto VHS ammorbidito */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.07) 50%);
            z-index: 10;
            background-size: 100% 4px;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.3) 100%);
            z-index: 5;
            pointer-events: none;
        }

        #game-container {
            max-width: 700px;
            width: 100%;
            border: 3px double var(--text-dark);
            padding: 30px;
            background-color: rgba(226, 206, 115, 0.9); 
            backdrop-filter: blur(1px);
            z-index: 2;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Titolo di testa */
        #game-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            border-bottom: 3px double var(--text-dark);
            padding-bottom: 10px;
        }

        #game-subtitle {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #57523d;
        }

        /* Status Bar */
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--text-dark);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .stat-label { color: #5c553a; }
        .stat-val { color: var(--text-dark); }

        #inventory-container { display: flex; gap: 5px; align-items: center; }

        .use-item-btn {
            background: var(--text-dark);
            color: var(--bg-yellow);
            border: none;
            padding: 2px 6px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
        }

        .use-item-btn:hover { background: var(--terminal-red); color: #fff; }

        /* Schermo di testo */
        #text-display {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            min-height: 180px;
            white-space: pre-line;
            font-weight: 600;
        }

        #choices-container { display: flex; flex-direction: column; gap: 14px; }

        .choice-btn {
            background-color: transparent;
            color: var(--text-dark);
            border: 2px solid var(--text-dark);
            padding: 14px 20px;
            font-family: inherit;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            font-weight: bold;
        }

        .choice-btn:hover {
            background-color: var(--text-dark);
            color: var(--bg-yellow);
            padding-left: 30px;
        }

        .choice-btn:hover::before { content: "> "; position: absolute; left: 12px; }

        /* Glitch alleggerito (solo un leggero sussulto della camera) */
        .glitch-screen {
            animation: shakeX 0.6s infinite;
        }

        /* Schermata iniziale di attivazione audio */
        #audio-gate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-yellow);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body id="body-screen">

    <!-- Schermata di avvio per i permessi Audio del Browser -->
    <div id="audio-gate">
        <h1 style="letter-spacing: 4px;">THE BACKROOMS</h1>
        <p style="max-width: 500px; font-weight: bold; line-height: 1.5;">Il gioco genera un soundscape horror procedurale in tempo reale. Indossa le cuffie.</p>
        <button class="choice-btn" id="start-game-btn" style="margin-top: 20px; text-align: center;">ENTRA NEL LIVELLO 0</button>
    </div>

    <div id="game-container" class="animate__animated animate__fadeIn">
        <!-- Titoli in testa -->
        <div id="game-title">The Backrooms</div>
        <div id="game-subtitle">Discesa Procedurale Infinita</div>

        <!-- Barra di Stato -->
        <div id="status-bar">
            <div><span class="stat-label">STANZA:</span> <span id="stat-location" class="stat-val">#0</span></div>
            <div><span class="stat-label">SANITA':</span> <span id="stat-sanity" class="stat-val">100%</span></div>
            <div id="inventory-container"><span class="stat-label">ZAINO:</span> <span id="stat-inventory" class="stat-val">Vuoto</span></div>
        </div>

        <!-- Schermo Narrativo -->
        <div id="text-display"></div>

        <!-- Opzioni Utente -->
        <div id="choices-container"></div>
    </div>

    <script>
        // STATO DEL GIOCO
        let gameState = {
            roomCount: 0,
            sanity: 100,
            inventory: [],
            currentRoomData: {}
        };

        // VARIABILI AUDIO
        let audioCtx = null;
        let neonOscillator = null;
        let droneOscillator = null;

        // DIZIONARI PER LA GENERAZIONE INFINITA
        const roomTypes = [
            "un corridoio ad angolo retto", "una stanza quadrata completamente vuota", 
            "uno snodo a tre vie", "un immenso salone pilastrato", 
            "un vicolo cieco soffocante", "una serie di uffici comunicanti senza porte"
        ];

        const wallDetails = [
            "la carta da parati gialla si sta scollando, rivelando macchie di muffa scura.",
            "le pareti sono perfettamente intonacate di un giallo accecante che ferisce gli occhi.",
            "qualcuno ha tracciato delle frecce sbiadite sul muro con un pennarello nero, ma si interrompono nel nulla.",
            "una delle pareti sembra vibrare visivamente se smetti di fissarla direttamente."
        ];

        const floorDetails = [
            "la moquette è zuppa d'acqua e produce un rumore umido a ogni tuo passo.",
            "l'odore di acido e vecchio emanato dal pavimento ti provoca una leggera nausea.",
            "il pavimento di linoleum scricchiola paurosamente sotto le tue scarpe.",
            "pezzi di moquette sono stati strappati via, lasciando scoperto il cemento nudo."
        ];

        const neonDetails = [
            "le luci al neon sopra di te ronzano a una frequenza altissima, quasi dolorosa.",
            "uno dei neon sfarfalla a intermittenza, gettando ombre scattose sulle pareti.",
            "la luce è costante, giallognola e priva di calore, come quella di un obitorio.",
            "senti un ronzio elettrico che sembra provenire dall'interno delle pareti stesse."
        ];

        // FUNZIONE: ATTIVA AUDIO (Sintesi in tempo reale a basso volume)
        function initAudio() {
            if (audioCtx) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Il Ronzio dei Neon (Frequenza acuta + oscillazione)
            neonOscillator = audioCtx.createOscillator();
            let neonGain = audioCtx.createGain();
            neonOscillator.type = 'sawtooth';
            neonOscillator.frequency.setValueAtTime(120, audioCtx.currentTime); // Frequenza base ronzio elettrico
            neonGain.gain.setValueAtTime(0.015, audioCtx.currentTime); // Volume molto basso per non infastidire
            
            // Filtro per rendere il neon più "reale" e asettico
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000;

            neonOscillator.connect(filter);
            filter.connect(neonGain);
            neonGain.connect(audioCtx.destination);
            neonOscillator.start();

            // 2. Il Drone Horror di Sottofondo (Frequenza cupa e profonda)
            droneOscillator = audioCtx.createOscillator();
            let droneGain = audioCtx.createGain();
            droneOscillator.type = 'sine';
            droneOscillator.frequency.setValueAtTime(55, audioCtx.currentTime); // Nota bassissima (La)
            droneGain.gain.setValueAtTime(0.02, audioCtx.currentTime); // Volume basso d'atmosfera
            
            droneOscillator.connect(droneGain);
            droneGain.connect(audioCtx.destination);
            droneGain.start();
        }

        // GENERATORE PROCEDURALE DI STANZE
        function generateRandomRoom() {
            gameState.roomCount++;
            
            // Scegli elementi casuali dai dizionari
            const type = roomTypes[Math.floor(Math.random() * roomTypes.length)];
            const wall = wallDetails[Math.floor(Math.random() * wallDetails.length)];
            const floor = floorDetails[Math.floor(Math.random() * floorDetails.length)];
            const neon = neonDetails[Math.floor(Math.random() * neonDetails.length)];

            let roomText = `Ti inoltri in ${type}.\n\nIntorno a te, ${wall} A terra, ${floor}\n\nIn alto, ${neon}`;
            let sanityImpact = 0;
            let hasItem = false;

            // Eventi Randomici della Stanza
            const randomEvent = Math.random();
            if (randomEvent < 0.25) {
                roomText += "\n\nSu un angolo del pavimento noti una bottiglietta abbandonata di Acqua Mandorlina.";
                hasItem = true;
            } else if (randomEvent > 0.75) {
                roomText += "\n\nIl ronzio si intensifica improvvisamente dentro la tua testa. Un senso di isolamento totale ti schiaccia le tempie.";
                sanityImpact = -15;
            } else if (randomEvent > 0.65 && randomEvent <= 0.75) {
                roomText += "\n\nSenti un brivido lungo la schiena. Da qualche parte, oltre il muro alla tua destra, riecheggia il suono di passi bagnati che accelerano.";
                sanityImpact = -20;
            }

            // Costruisci le scelte procedurali
            let choices = [
                { text: "Avanza verso il prossimo corridoio", action: "move" },
                { text: "Svolta l'angolo ed esplora una nuova sezione", action: "move" }
            ];

            if (hasItem) {
                choices.unshift({ text: "Raccogli l'Acqua Mandorlina", action: "loot" });
            }

            gameState.currentRoomData = {
                text: roomText,
                sanityImpact: sanityImpact,
                choices: choices
            };
        }

        // MOTORE DI RENDERING
        function renderGame() {
            if (gameState.sanity <= 0) {
                gameState.sanity = 0;
                executeGameOver();
                return;
            }

            const room = gameState.currentRoomData;

            // Applica danno alla sanità se presente
            if (room.sanityImpact < 0) {
                gameState.sanity += room.sanityImpact;
                room.sanityImpact = 0; // Evita di riapplicarlo se si rinfresca lo schermo
                triggerGlitchEffect(true);
                if (gameState.sanity <= 0) { renderGame(); return; }
            } else {
                triggerGlitchEffect(false);
            }

            // Aggiorna UI
            document.getElementById("stat-location").innerText = `#${gameState.roomCount}`;
            
            const sanityElement = document.getElementById("stat-sanity");
            sanityElement.innerText = gameState.sanity + "%";
            sanityElement.style.color = gameState.sanity < 50 ? "var(--terminal-red)" : "var(--text-dark)";

            // Gestione Zaino/Inventario
            const inventoryElement = document.getElementById("stat-inventory");
            if (gameState.inventory.length === 0) {
                inventoryElement.innerText = "Vuoto";
            } else {
                inventoryElement.innerHTML = "";
                gameState.inventory.forEach((item, index) => {
                    const itemSpan = document.createElement("span");
                    itemSpan.innerText = item;
                    const useBtn = document.createElement("button");
                    useBtn.innerText = "BEVI";
                    useBtn.classList.add("use-item-btn");
                    useBtn.addEventListener("click", () => useAlmondWater(index));
                    itemSpan.appendChild(useBtn);
                    inventoryElement.appendChild(itemSpan);
                });
            }

            // Stampa testo
            document.getElementById("text-display").innerText = room.text;

            // Rigenera Scelte
            const choicesContainer = document.getElementById("choices-container");
            choicesContainer.innerHTML = "";

            room.choices.forEach(choice => {
                const button = document.createElement("button");
                button.classList.add("choice-btn", "animate__animated", "animate__fadeInUp");
                button.innerText = choice.text;
                
                button.addEventListener("click", () => {
                    if (choice.action === "move") {
                        generateRandomRoom();
                    } else if (choice.action === "loot") {
                        if (!gameState.inventory.includes("Acqua Mandorlina")) {
                            gameState.inventory.push("Acqua Mandorlina");
                        }
                        // Rimuovi l'opzione di raccoglierla dopo il click
                        room.choices = room.choices.filter(c => c.action !== "loot");
                        room.text = room.text.replace("\n\nSu un angolo del pavimento noti una bottiglietta abbandonata di Acqua Mandorlina.", "\n\nHai raccolto la bottiglia.");
                    }
                    renderGame();
                });
                choicesContainer.appendChild(button);
            });
        }

        function useAlmondWater(index) {
            gameState.inventory.splice(index, 1);
            gameState.sanity = Math.min(gameState.sanity + 35, 100);
            renderGame();
        }

        // Effetto sussulto camera attenuato
        function triggerGlitchEffect(activate) {
            const screen = document.getElementById("body-screen");
            if (activate) {
                screen.classList.add("glitch-screen");
                // Modifica leggermente la frequenza del drone per riflettere il panico
                if (droneOscillator) droneOscillator.frequency.setValueAtTime(65, audioCtx.currentTime);
            } else {
                screen.classList.remove("glitch-screen");
                if (droneOscillator && audioCtx) droneOscillator.frequency.setValueAtTime(55, audioCtx.currentTime);
            }
        }

        function executeGameOver() {
            triggerGlitchEffect(true);
            if (neonOscillator) neonOscillator.frequency.setValueAtTime(30, audioCtx.currentTime); // Il neon "muore"
            
            document.getElementById("stat-sanity").innerText = "0% - FOLLIA";
            document.getElementById("text-display").innerText = `Il giallo ha consumato la tua mente dopo aver esplorato ${gameState.roomCount} stanze.\n\nIl ronzio delle luci ti ha riempito i pensieri fino a cancellare ogni ricordo del mondo reale. Ormai sei parte della struttura.`;
            
            const choicesContainer = document.getElementById("choices-container");
            choicesContainer.innerHTML = "";
            const restartBtn = document.createElement("button");
            restartBtn.classList.add("choice-btn");
            restartBtn.innerText = "Resetta la tua coscienza (Ricomincia)";
            restartBtn.addEventListener("click", () => {
                gameState.roomCount = 0;
                gameState.sanity = 100;
                gameState.inventory = [];
                if (neonOscillator) neonOscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
                generateRandomRoom();
                renderGame();
            });
            choicesContainer.appendChild(restartBtn);
        }

        // TRIGGER DI AVVIO JAVASCRIPT
        document.getElementById("start-game-btn").addEventListener("click", () => {
            initAudio(); // Avvia i sintetizzatori horror
            document.getElementById("audio-gate").style.display = "none"; // Nascondi la schermata protettiva
            generateRandomRoom(); // Genera la prima stanza procedurale
            renderGame();
        });
    </script>
</body>
</html>
